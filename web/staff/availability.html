<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>填寫可上班時段</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>填寫可上班時段</h1>
    <p class="muted">在每個班別 × 星期的格子選擇你的意願,填完按「儲存」。不用註冊。</p>
  </header>

  <div id="status" class="status" hidden></div>
  <p id="loading" class="muted">載入中…</p>
  <section class="card" id="fatal" hidden></section>

  <section class="card" id="meSection" hidden>
    <p>嗨 <strong id="empName"></strong>,這是 <strong id="storeName"></strong> 的班表,請填寫你每週固定可上的時段:</p>
    <p class="muted pref-legend">點一下格子循環切換意願:
      <span class="pref-empty">未填</span>
      <span class="pref-2">非常想上</span>
      <span class="pref-1">可配合</span>
      <span class="pref-0">絕對不行</span>
    </p>
    <div id="fillGrid"></div>
    <div class="row">
      <button id="save">儲存我的時段</button>
    </div>
  </section>

  <script src="/static/staff/availability.js"></script>
</body>
</html>
